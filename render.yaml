# Render.com blueprint — one-click deploy of SnaCleX.
# In Render: New ▸ Blueprint ▸ pick this repo. No build step, no dependencies.
services:
  - type: web
    name: snaclex
    runtime: python
    plan: free
    # SnaCleX has no dependencies; this just gives Render a non-blank,
    # always-succeeding build step (prints the Python version).
    buildCommand: python --version
    startCommand: python server.py
    autoDeploy: true
    healthCheckPath: /
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.6"
      # Cache upstream (RCSB/PubChem/ChEMBL/Pfam) responses on disk so repeat
      # lookups are instant and survive restarts. Caching is off unless set.
      - key: SNACLEX_HTTP_CACHE
        value: "/tmp/snaclex-http-cache"
