# Render.com blueprint — one-click deploy of AtomScope.
# In Render: New ▸ Blueprint ▸ pick this repo. No build step, no dependencies.
services:
  - type: web
    name: atomscope
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python server.py
    autoDeploy: true
    healthCheckPath: /
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.6"
