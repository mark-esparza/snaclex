name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # SnaCleX targets 3.12 (see runtime.txt) but is stdlib-only, so it
        # should run cleanly across modern Pythons.
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        # SnaCleX is dependency-free; this keeps parity with the Render build.
        run: pip install -r requirements.txt

      - name: Byte-compile all sources
        run: python -m compileall -q server.py snaclex tests

      - name: Run test suite
        run: python -m unittest discover -s tests -v
